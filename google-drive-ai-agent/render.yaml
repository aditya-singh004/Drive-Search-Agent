# Render Blueprint: two Docker web services.
# https://render.com/docs/monorepo-support
#
# rootDir = folder that contains backend/ and frontend/ in your Git repo.
# If your repo root IS already that folder (no extra wrapper), change rootDir to "."
# and use dockerfilePath ./Dockerfile with dockerContext . for each — or split services.
#
# After deploy: set secrets in dashboard (OPENAI_API_KEY, GOOGLE_*, CORS_ORIGINS, BACKEND_URL).

services:
  - type: web
    name: drive-search-api
    runtime: docker
    plan: free
    rootDir: google-drive-ai-agent
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_DRIVE_FOLDER_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_FILE
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: drive-search-ui
    runtime: docker
    plan: free
    rootDir: google-drive-ai-agent
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    envVars:
      - key: BACKEND_URL
        sync: false
